name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: Build and release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install Clojure CLI
        uses: DeLaGuardo/setup-clojure@12
        with:
          cli: latest

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
          key: ${{ runner.os }}-clojure-build-${{ hashFiles('deps.edn') }}
          restore-keys: |
            ${{ runner.os }}-clojure-

      - name: Build JAR
        run: clojure -T:build jar

      - name: Verify JAR contains metabase-plugin.yaml
        run: |
          JAR=$(ls target/*.metabase-driver.jar | head -1)
          echo "Checking $JAR"
          jar tf "$JAR" | grep -q "metabase-plugin.yaml" \
            || (echo "ERROR: metabase-plugin.yaml not found in JAR" && exit 1)
          echo "metabase-plugin.yaml present."

      - name: Rename JAR with version
        id: jar
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SOURCE=$(ls target/*.metabase-driver.jar | head -1)
          DEST="target/metabase-driver-hasura-${VERSION}.metabase-driver.jar"
          cp "$SOURCE" "$DEST"
          echo "path=$DEST" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ${{ steps.jar.outputs.path }}
