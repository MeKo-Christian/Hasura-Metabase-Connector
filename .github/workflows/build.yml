name: Build

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  build:
    name: Build plugin JAR
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install Clojure CLI
        uses: DeLaGuardo/setup-clojure@12
        with:
          cli: latest

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
          key: ${{ runner.os }}-clojure-build-${{ hashFiles('deps.edn') }}
          restore-keys: |
            ${{ runner.os }}-clojure-

      - name: Build JAR
        run: clojure -T:build jar

      - name: Verify JAR contains metabase-plugin.yaml
        run: |
          JAR=$(ls target/*.metabase-driver.jar | head -1)
          echo "Checking $JAR"
          jar tf "$JAR" | grep -q "metabase-plugin.yaml" \
            || (echo "ERROR: metabase-plugin.yaml not found in JAR" && exit 1)
          echo "metabase-plugin.yaml present."

      - name: Upload plugin JAR
        uses: actions/upload-artifact@v4
        with:
          name: hasura-metabase-driver
          path: target/*.metabase-driver.jar
