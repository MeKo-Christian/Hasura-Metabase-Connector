name: Lint

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  lint:
    name: Lint (clj-kondo)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Clojure CLI
        uses: DeLaGuardo/setup-clojure@12
        with:
          cli: latest

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-lint-${{ hashFiles('deps.edn') }}

      - name: Run clj-kondo
        run: clojure -M:lint
