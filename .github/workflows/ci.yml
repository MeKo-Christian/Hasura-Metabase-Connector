name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

env:
  HASURA_GRAPHQL_ADMIN_SECRET: ci-admin-secret

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Unit tests — no Docker required.
  # ─────────────────────────────────────────────────────────────────────────
  unit:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install Clojure CLI
        uses: DeLaGuardo/setup-clojure@12
        with:
          cli: latest

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
          key: ${{ runner.os }}-clojure-${{ hashFiles('deps.edn') }}
          restore-keys: |
            ${{ runner.os }}-clojure-

      - name: Download dependencies
        run: clojure -A:test -P

      - name: Run unit tests
        run: clojure -M:test --namespace-regex '(?!.*integration).*-test$'

  # ─────────────────────────────────────────────────────────────────────────
  # Build — verify the plugin JAR can be produced.
  # ─────────────────────────────────────────────────────────────────────────
  build:
    name: Build plugin JAR
    runs-on: ubuntu-latest
    needs: unit

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install Clojure CLI
        uses: DeLaGuardo/setup-clojure@12
        with:
          cli: latest

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
          key: ${{ runner.os }}-clojure-build-${{ hashFiles('deps.edn') }}
          restore-keys: |
            ${{ runner.os }}-clojure-

      - name: Build JAR
        run: clojure -T:build jar

      - name: Verify JAR contains metabase-plugin.yaml
        run: |
          JAR=$(ls target/*.metabase-driver.jar | head -1)
          echo "Checking $JAR"
          jar tf "$JAR" | grep -q "metabase-plugin.yaml" \
            || (echo "ERROR: metabase-plugin.yaml not found in JAR" && exit 1)
          echo "metabase-plugin.yaml present."

      - name: Upload plugin JAR
        uses: actions/upload-artifact@v4
        with:
          name: hasura-metabase-driver
          path: target/*.metabase-driver.jar

  # ─────────────────────────────────────────────────────────────────────────
  # Integration tests — requires Docker Compose stack.
  # ─────────────────────────────────────────────────────────────────────────
  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: unit

    services: {}   # Managed by docker compose below, not as GHA services.

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install Clojure CLI
        uses: DeLaGuardo/setup-clojure@12
        with:
          cli: latest

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
          key: ${{ runner.os }}-clojure-${{ hashFiles('deps.edn') }}
          restore-keys: |
            ${{ runner.os }}-clojure-

      - name: Write .env
        run: |
          cat > .env <<EOF
          POSTGRES_USER=hasura
          POSTGRES_PASSWORD=hasurapassword
          POSTGRES_DB=hasura_dev
          HASURA_GRAPHQL_DATABASE_URL=postgres://hasura:hasurapassword@postgres:5432/hasura_dev
          HASURA_GRAPHQL_ENABLE_CONSOLE=false
          HASURA_GRAPHQL_DEV_MODE=false
          HASURA_GRAPHQL_ENABLED_APIS=metadata,graphql,config
          HASURA_GRAPHQL_ADMIN_SECRET=${{ env.HASURA_GRAPHQL_ADMIN_SECRET }}
          HASURA_GRAPHQL_LOG_LEVEL=warn
          MB_DB_TYPE=h2
          MB_DB_FILE=/metabase-data/metabase.db
          MB_PLUGINS_DIR=/plugins
          EOF

      - name: Start Docker Compose stack (Postgres + Hasura only)
        run: docker compose up -d postgres hasura

      - name: Wait for Hasura health
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080/healthz && echo " Hasura ready." && break
            echo "Waiting... ($i/30)"
            sleep 4
          done

      - name: Verify seed and metadata
        run: make stack-seed
        env:
          HASURA_URL: http://localhost:8080
          HASURA_SECRET: ${{ env.HASURA_GRAPHQL_ADMIN_SECRET }}

      - name: Download deps
        run: clojure -A:test-integration -P

      - name: Run integration tests
        run: clojure -M:test-integration
        env:
          HASURA_URL: http://localhost:8080
          HASURA_SECRET: ${{ env.HASURA_GRAPHQL_ADMIN_SECRET }}

      - name: Stop stack
        if: always()
        run: docker compose down -v

  # ─────────────────────────────────────────────────────────────────────────
  # Lint
  # ─────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (clj-kondo)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Clojure CLI
        uses: DeLaGuardo/setup-clojure@12
        with:
          cli: latest

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-lint-${{ hashFiles('deps.edn') }}

      - name: Run clj-kondo
        run: clojure -M:lint
